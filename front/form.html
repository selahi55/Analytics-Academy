    <!-- Header -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/front/index.html" id="navbar__logo">
                <header class="header">
                    <img src="/front/resources/ghrd-logo.png" alt="GHRD Logo" class="logo_GHRD">
                    <img src="/front/resources/ngun_logo.png" alt="NGUN Logo" class="logo_NGUN">
                </header>
            </a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="/front/index.html" class="navbar__links">Event</a>
                </li>
                <li class="navbar__item">

                </li>
                <li class="navbar__btn">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
        
                <!-- Full Legal Name -->
                <label for="full-name">Full Legal Name:</label>
                <input type="text" id="full-name" name="full-name" placeholder="Enter your full legal name" required>
        
                <!-- Gender -->
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Non-binary">Non-binary</option>
                    <option value="Genderqueer">Genderqueer</option>
                    <option value="Genderfluid">Genderfluid</option>
                    <option value="Self-describe">Prefer to self-describe</option>
                    <option value="Prefer-not-to-say">Prefer not to say</option>
                </select>
        
                <!-- Self-describe Gender -->
                <label for="self-describe">If self-describe, please specify:</label>
                <input type="text" id="self-describe" name="self-describe" placeholder="Specify your gender">
        
                <!-- Date of Birth -->
                <label for="dob">Date of Birth (D.o.B):</label>
                <input type="date" id="dob" name="dob" required>

                <!-- Organization/Institution -->
                <label for="organization">Name of Organization / Educational Institute / Community:</label>
                <input type="text" id="organization" name="organization" placeholder="Enter organization/institution name" required>
        
                <!-- Role/Title -->
                <label for="role">Role/Title:</label>
                <input type="text" id="role" name="role" placeholder="Enter your role or title" required>
        
                <!-- Country of Residence -->
                <label for="residence">Country of Residence:</label>
                <select id="residence" name="residence" required>
                    <option value="">Select Country of Residence</option>
                    <script>
                        countries.forEach(country => {
                            document.write(`<option value="${country}">${country}</option>`);
                        });
                    </script>
                </select>
        
                <!-- LinkedIn Profile -->
                <label for="linkedin">LinkedIn Profile:</label>
                <input type="url" id="linkedin" name="linkedin" placeholder="Enter your LinkedIn profile URL">
        
                <!-- Attending Virtually -->
                <label>Are you attending virtually?</label>
                <div>
                    <input type="radio" id="virtual-yes" name="attending-virtually" value="Yes" required>
                    <label for="virtual-yes">Yes</label>
                    <input type="radio" id="virtual-no" name="attending-virtually" value="No">
                    <label for="virtual-no">No</label>
                </div>
        
                <!-- Visa Support Letter -->
                <label>Do you need a support letter for a visa to attend the NGUN at The Hague in May 2025?</label>
                <div>
                    <input type="radio" id="visa-yes" name="visa-support" value="Yes" required>
                    <label for="visa-yes">Yes</label>
                    <input type="radio" id="visa-no" name="visa-support" value="No">
                    <label for="visa-no">No</label>
                </div>
        
                <!-- Referral Source -->
                <label for="referral">How did you hear about the NGUN conference?</label>
                <select id="referral" name="referral" required>
                    <option value="">Select an option</option>
                    <option value="Referral">Referral</option>
                    <option value="Organization/Institution">Organization/Institution</option>
                    <option value="Email Advertisement">Email Advertisement</option>
                    <option value="Social Media">Social Media</option>
                </select>
