{% extends 'dashboard/dashboard_base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}

<h1 style="color: #000000; text-align: center; margin:10px">Update Attendee: {{ attendee.first_name }} {{ attendee.last_name }}</h1>

<div class="card mb-4" style="margin: 10px;">
    <div class="card-body">
            <form method="post" action="{% url 'update-attendee' instance.id %}">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="slider-btn">
                    <button type="submit" class="btn ss-btn" data-animation="fadeInRight" data-delay=".8s" style="
                    color: white;
                    background: black;
                    ">Update</button>                
                </div>
            </form>
            <button style="margin-bottom: 10px;" text="text" class="btn ss-btn" data-animation="fadeInRight" data-delay=".8s"><a href="{% url 'attendees' %}">Go Back</a></button>
        </div>
    </div>

{% endblock content %}
