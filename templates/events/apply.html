{% extends 'events/event_base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
    <!-- Registration Form -->
    <div class="wrapper">
        <div class="form__container">
            <h2>Application Form</h2>
            <form action="{% url 'apply' %}" method="post" class="payment-form">
                {% csrf_token %}
                <div class="form-container" style="
                display: flex;
                flex-direction: column;
                gap: 15px;">
                    {{ form|crispy }}
                </div>
                <!-- Credit Card Form -->
                <div class="credit-card-form" style="
                display: flex;
                flex-direction: column;
                gap: 15px;
                margin-top: 20px;">
                    <h3>Card Payment</h3>
                    <div id="card-element">
                        <!-- Stripe Element will be inserted here -->
                    </div>
                    <div id="card-errors" role="alert"></div>
                </div>
                <!-- Submit Button -->
                <button id="submit-button" type="submit" style="
                width: 100%;
                padding: 10px;
                color: white;
                background-color: #007bff;
                border: none;
                border-radius: 5px;
                cursor: pointer;">
                    Submit
                </button>
            </form>
        </div>
    </div>
    <style>
        .form__container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-container input, .form-container select, .form-container textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-container input:focus, .form-container select:focus, .form-container textarea:focus {
            border-color: #4CAF50;
            outline: none;
        }
    </style>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
    // Set your publishable key
    var stripe = Stripe('STRIPE_KEY');
    var elements = stripe.elements();

    // Create an instance of the card Element
    var card = elements.create('card');
    card.mount('#card-element');

    // Handle real-time validation errors from the card Element
    card.on('change', function(event) {
        var displayError = document.getElementById('card-errors');
        if (event.error) {
            displayError.textContent = event.error.message;
        } else {
            displayError.textContent = '';
        }
    });

    // Handle form submission
    var form = document.getElementById('payment-form');
        form.addEventListener('submit', function(event) {
            event.preventDefault();

            fetch('/create-payment-intent/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    amount: 1000  // amount in cents
                })
            }).then(function(response) {
                return response.json();
            }).then(function(paymentIntentResponse) {
                if (paymentIntentResponse.error) {
                    var errorElement = document.getElementById('card-errors');
                    errorElement.textContent = paymentIntentResponse.error;
                } else {
                    stripe.confirmCardPayment(paymentIntentResponse.client_secret, {
                        payment_method: {
                            card: card
                        }
                    }).then(function(result) {
                        if (result.error) {
                            var errorElement = document.getElementById('card-errors');
                            errorElement.textContent = result.error.message;
                        } else {
                            if (result.paymentIntent.status === 'succeeded') {
                                form.submit();
                            }
                        }
                    });
                }
            });
        });
</script>

{% endblock content %}
