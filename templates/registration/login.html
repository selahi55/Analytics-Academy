{% extends "registration/login_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log-in{% endblock %}
{% block content %}
<div class="card-header"><h3 class="text-center font-weight-light my-4">Login using Email/Username</h3></div>
<div class="card-body">
    <form action="{% url 'login'%}" method="post">
        {% csrf_token %}
        <strong> 
            {{ form|crispy }}
        </strong>
        <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
        <br>
        <button type="submit" class="btn ss-btn" data-animation="fadeInRight" data-delay=".8s" style="background: blue;
        color: white;">Login</button>
    </form> 
</div>
{% endblock %}
