{% extends "registration/login_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset your password{% endblock %}
{% block content %}
<div class="card-header"><h3 class="text-center font-weight-light my-4">Forgotten your password?</h3></div>
<div class="card-body">
    <p>Enter your e-mail address to obtain a new password.</p>
    <form method="post">
        {% csrf_token %}
        <strong> 
            {{ form|crispy }}
        </strong>
        <br>
        <button type="submit" class="btn ss-btn" data-animation="fadeInRight" data-delay=".8s" style="background: blue;
        color: white;">Send e-mail</button>
    </form> 
</div>
{% endblock %}
